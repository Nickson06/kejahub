<!DOCTYPE html>
<html lang="en">

<head>


<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
KejaHub | Register
</title>



<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">


<link rel="stylesheet" href="css/auth.css">


</head>



<body>


<div class="auth-container">


<div class="auth-image register-bg">


<div class="overlay">


<h1>
Your next home awaits
</h1>


<p>
Join thousands finding better homes.
</p>


</div>


</div>





<div class="auth-form">


<div class="brand">

<span>Keja</span>Hub

</div>



<h2>
Create Account
</h2>


<p class="subtitle">
Join Kenya's smarter housing platform
</p>



<div class="input-group">

<label>
Full Name
</label>

<input id="name"
placeholder="John Otieno">

</div>



<div class="input-group">

<label>
Email
</label>

<input id="email"
type="email"
placeholder="email@example.com">

</div>




<div class="input-group">

<label>
Password
</label>

<input 
id="password"
type="password"
placeholder="Create password">

</div>



<div class="input-group">


<label>
Account Type
</label>


<select id="role">


<option value="tenant">
I am looking for a home
</option>


<option value="landlord">
I want to list property
</option>


</select>


</div>




<button onclick="register()">

Create Account

</button>



<p class="bottom-text">

Already have an account?

<a href="login.html">
Login
</a>


</p>



</div>


</div>

<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/validation.js"></script>


</body>


</html>
